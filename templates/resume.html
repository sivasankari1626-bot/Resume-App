<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;}
.container{width:80%;margin:auto;}
</style>
</head>
<body>

<div class="container">

<h1>{{ data.name }}</h1>
<p>{{ data.email }} | {{ data.phone }}</p>
<p>{{ data.address }}</p>

<h2>Summary</h2>
<p>{{ data.summary }}</p>

<h2>Skills</h2>
<p>{{ data.skills }}</p>

<h2>Education</h2>
<p>{{ data.degree }} - {{ data.college }}</p>

<button onclick="window.print()">Download Resume</button>

</div>

</body>
</html>
